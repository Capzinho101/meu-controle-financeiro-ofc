<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Controle de Gastos</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-900 text-white p-6">

<div class="max-w-2xl mx-auto bg-gray-800 p-6 rounded-2xl shadow-lg">

  <h1 class="text-2xl font-bold mb-4">💰 Controle de Gastos</h1>

  <!-- LOGIN -->
  <div class="mb-4 text-center">
    <button onclick="login()" class="bg-green-600 px-4 py-2 rounded">Login Google</button>
    <button onclick="logout()" class="bg-gray-600 px-4 py-2 rounded ml-2">Sair</button>
    <p id="user" class="text-sm mt-2"></p>
  </div>

  <div id="app" style="display:none;">

    <!-- CICLO -->
    <div class="mb-4">
      <input id="cycle" type="number" placeholder="Dia de início do mês (ex: 1, 5, 10)"
        class="bg-gray-700 p-2 w-full rounded text-white">

      <button onclick="setCycle()"
        class="bg-purple-600 px-4 py-2 rounded w-full mt-2">
        Definir ciclo
      </button>
    </div>

    <!-- TRANSAÇÃO -->
    <div class="mb-4">
      <input id="desc" type="text" placeholder="Descrição"
        class="bg-gray-700 p-2 w-full mb-2 rounded text-white">

      <select id="category"
        class="bg-gray-700 p-2 w-full mb-2 rounded text-white">
        <option>Alimentação</option>
        <option>Transporte</option>
        <option>Contas</option>
        <option>Lazer</option>
        <option>Outros</option>
      </select>

      <input id="value" type="number" placeholder="Valor"
        class="bg-gray-700 p-2 w-full mb-2 rounded text-white">

      <button onclick="addTransaction()"
        class="bg-blue-600 px-4 py-2 rounded w-full">
        Adicionar
      </button>
    </div>

    <!-- DÍVIDA -->
    <div class="mb-4">
      <input id="debt" type="number" placeholder="Total de dívidas"
        class="bg-gray-700 p-2 w-full mb-2 rounded text-white">

      <button onclick="setDebt()"
        class="bg-red-600 px-4 py-2 rounded w-full">
        Definir Dívida
      </button>
    </div>

    <!-- RESUMO -->
    <div class="grid grid-cols-2 gap-4 text-sm mb-4">
      <div class="bg-green-900 p-3 rounded">
        <p>Entradas</p>
        <strong>R$ <span id="income">0</span></strong>
      </div>

      <div class="bg-red-900 p-3 rounded">
        <p>Gastos</p>
        <strong>R$ <span id="expenses">0</span></strong>
      </div>

      <div class="bg-blue-900 p-3 rounded">
        <p>Saldo</p>
        <strong>R$ <span id="balance">0</span></strong>
      </div>

      <div class="bg-yellow-700 text-black p-3 rounded">
        <p>Dívida restante</p>
        <strong>R$ <span id="remaining">0</span></strong>
      </div>
    </div>

    <ul id="list" class="space-y-2"></ul>

  </div>
</div>

<script>
// ================= FIREBASE =================
const firebaseConfig = {
    apiKey: "AIzaSyDeXJ_uSeaLgPKRUA1nCV7UFwEzpmiOmHc",
    authDomain: "meu-controle-financeiro-a0572.firebaseapp.com",
    projectId: "meu-controle-financeiro-a0572",
    storageBucket: "meu-controle-financeiro-a0572.firebasestorage.app",
    messagingSenderId: "202199536593",
    appId: "1:202199536593:web:be012b0bd8c44b8c86c6f0"
  };

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ================= VARIÁVEIS =================
let userId = null;
let transactions = [];
let debt = 0;
let cycleStartDay = 1;

// ================= LOGIN =================
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithRedirect(provider);
}

function logout() {
  auth.signOut();
}

// ================= USER =================
auth.onAuthStateChanged(async (user) => {
  if (user) {
    userId = user.uid;
    document.getElementById('user').innerText = user.email;
    document.getElementById('app').style.display = 'block';
    await loadData();
  } else {
    userId = null;
    document.getElementById('user').innerText = '';
    document.getElementById('app').style.display = 'none';
  }
});

// ================= LOAD =================
async function loadData() {
  const doc = await db.collection('users').doc(userId).get();

  if (doc.exists) {
    const data = doc.data();
    transactions = data.transactions || [];
    debt = data.debt || 0;
    cycleStartDay = data.cycleStartDay || 1;
  }

  updateUI();
}

// ================= SAVE =================
async function saveData() {
  if (!userId) return;

  await db.collection('users').doc(userId).set({
    transactions,
    debt,
    cycleStartDay
  });
}

// ================= CICLO =================
function getCycle(date = new Date()) {
  const d = new Date(date);
  if (d.getDate() < cycleStartDay) {
    d.setMonth(d.getMonth() - 1);
  }
  return `${d.getFullYear()}-${d.getMonth() + 1}`;
}

function setCycle() {
  const value = parseInt(document.getElementById('cycle').value);
  cycleStartDay = isNaN(value) ? 1 : value;

  saveData();
  updateUI();
}

// ================= ADD =================
function addTransaction() {
  const desc = document.getElementById('desc').value.trim();
  const value = parseFloat(document.getElementById('value').value);
  const category = document.getElementById('category').value;

  if (!desc || isNaN(value)) return alert("Preencha corretamente");

  transactions.push({
    desc,
    value,
    category,
    date: new Date().toISOString()
  });

  updateUI();
  saveData();
}

// ================= REMOVE =================
function removeTransaction(i) {
  transactions.splice(i, 1);
  updateUI();
  saveData();
}

// ================= DEBT =================
function setDebt() {
  debt = parseFloat(document.getElementById('debt').value) || 0;
  updateUI();
  saveData();
}

// ================= UI =================
function updateUI() {
  const list = document.getElementById('list');
  list.innerHTML = '';

  const currentCycle = getCycle();

  let total = 0;
  let income = 0;
  let expenses = 0;

  const filtered = transactions.filter(t => {
    return getCycle(t.date) === currentCycle;
  });

  filtered.forEach((t, i) => {
    total += t.value;

    if (t.value > 0) income += t.value;
    else expenses += t.value;

    const li = document.createElement('li');
    li.className = 'bg-gray-700 p-2 rounded flex justify-between';

    li.innerHTML = `
      <span>${t.desc} (${t.category})</span>
      <span>R$ ${t.value.toFixed(2)}</span>
      <button onclick="removeTransaction(${i})" class="text-red-400">X</button>
    `;

    list.appendChild(li);
  });

  document.getElementById('income').innerText = income.toFixed(2);
  document.getElementById('expenses').innerText = Math.abs(expenses).toFixed(2);
  document.getElementById('balance').innerText = total.toFixed(2);
  document.getElementById('remaining').innerText = Math.max(debt - total, 0).toFixed(2);
}

</script>

</body>
</html>
